<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Cortex</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px 24px; }
  h1 { color: #7ee8a2; font-size: 1.3rem; font-weight: 600; }
  .subtitle { color: #444; font-size: 0.75rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: #111; border: 1px solid #222; border-radius: 8px; padding: 16px; }
  .panel-title { color: #666; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
  /* Agents */
  .agent-list { display: flex; flex-direction: column; gap: 8px; }
  .agent-row { display: flex; align-items: center; gap: 8px; background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 12px; }
  .agent-row.alive { border-color: #1a4a2a; }
  .agent-row.dead { border-color: #4a1a1a; }
  .agent-row.disabled { border-color: #2a2a2a; opacity: 0.55; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: #7ee8a2; box-shadow: 0 0 5px #7ee8a2; }
  .dot.red { background: #e87e7e; }
  .dot.gray { background: #444; }
  .agent-name { flex: 1; font-size: 0.88rem; }
  .agent-meta { color: #555; font-size: 0.7rem; margin-right: 4px; white-space: nowrap; }
  .btn { border: none; border-radius: 4px; padding: 4px 9px; font-size: 0.7rem; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .btn-start  { background: #1a4a2a; color: #7ee8a2; }
  .btn-start:hover  { background: #1f5a32; }
  .btn-stop   { background: #4a1a1a; color: #e87e7e; }
  .btn-stop:hover   { background: #5a2020; }
  .btn-enable  { background: #1a2a1a; color: #7eb87e; border: 1px solid #2a4a2a; }
  .btn-enable:hover  { background: #1f3a1f; }
  .btn-disable { background: #1e1e1e; color: #666; border: 1px solid #2a2a2a; }
  .btn-disable:hover { background: #252525; }
  .btn-send { background: #1a2a4a; color: #7eb8e8; padding: 8px 16px; font-size: 0.8rem; width: 100%; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .btn-send:hover { background: #1f3260; }
  .btn-send:disabled { opacity: 0.4; cursor: default; }
  /* Bus form */
  select, textarea { width: 100%; background: #161616; border: 1px solid #2a2a2a; border-radius: 4px; color: #e0e0e0; font-family: inherit; font-size: 0.8rem; padding: 8px 10px; outline: none; }
  select { margin-bottom: 8px; }
  select:focus, textarea:focus { border-color: #444; }
  textarea { resize: vertical; min-height: 70px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a4a2a; color: #7ee8a2; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.error { background: #4a1a1a; color: #e87e7e; }
  /* Bus messages */
  .msg-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .msg { background: #161616; border: 1px solid #222; border-radius: 5px; padding: 8px 10px; font-size: 0.75rem; }
  .msg-meta { color: #555; margin-bottom: 3px; }
  .msg-content { color: #bbb; white-space: pre-wrap; word-break: break-word; max-height: 60px; overflow: hidden; }
  /* Logs */
  .log-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 5px; height: 300px; overflow-y: auto; padding: 10px; font-size: 0.72rem; line-height: 1.5; }
  .log-line { color: #555; }
  .log-line.inf { color: #888; }
  .log-line.err { color: #c07070; }
  .log-line.bus { color: #7090c0; }
  .log-line.daemon { color: #70a870; }
  .empty { color: #333; font-size: 0.8rem; font-style: italic; }
  .refresh-badge { float: right; color: #333; font-size: 0.65rem; }
  /* Tabs conversații */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { background: #161616; border: 1px solid #2a2a2a; border-radius: 4px; padding: 5px 14px; font-size: 0.75rem; cursor: pointer; color: #666; font-family: inherit; }
  .tab.active { background: #1a2a4a; border-color: #2a4a6a; color: #7eb8e8; }
  .tab:hover:not(.active) { background: #1e1e1e; color: #888; }
  .conv-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 5px; height: 320px; overflow-y: auto; padding: 10px; font-size: 0.75rem; line-height: 1.6; }
  .conv-line { color: #999; padding: 1px 0; border-bottom: 1px solid #111; }
  .conv-line:last-child { border-bottom: none; }
  /* Heartbeat table */
  .hb-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
  .hb-table th { color: #444; font-weight: normal; text-align: left; padding: 4px 8px; border-bottom: 1px solid #1e1e1e; white-space: nowrap; }
  .hb-table td { padding: 6px 8px; border-bottom: 1px solid #181818; color: #888; white-space: nowrap; }
  .hb-table tr:last-child td { border-bottom: none; }
  .hb-table td.name { color: #ccc; }
  .hb-table td.ok { color: #7ee8a2; }
  .hb-table td.warn { color: #e8c87e; }
  .hb-table td.last { color: #555; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
<h1>⬡ Nova Cortex</h1>
<p class="subtitle">Dashboard local · auto-refresh 3s</p>

<div class="grid">
  <!-- Agenți -->
  <div class="panel">
    <div class="panel-title">Agenți <span class="refresh-badge" id="agent-ts"></span></div>
    <div class="agent-list" id="agents"><div class="empty">Se încarcă...</div></div>
  </div>

  <!-- Trimite mesaj bus -->
  <div class="panel">
    <div class="panel-title">Trimite mesaj bus</div>
    <select id="bus-to"><option value="">— alege agent —</option></select>
    <textarea id="bus-content" placeholder='ex: "Analizează tendințele AI din 2025"' rows="3"></textarea>
    <button class="btn btn-send" id="bus-send" onclick="sendBus()">Trimite</button>
  </div>
</div>

<!-- Heartbeat panel -->
<div class="panel" style="margin-bottom:20px">
  <div class="panel-title">Heartbeat agenți <span class="refresh-badge" id="hb-ts"></span></div>
  <div id="hb-content"><div class="empty">Aștept heartbeat-uri...</div></div>
</div>

<div class="grid">
  <!-- Mesaje bus recente -->
  <div class="panel">
    <div class="panel-title">Mesaje bus recente</div>
    <div class="msg-list" id="bus-msgs"><div class="empty">Niciun mesaj procesat.</div></div>
  </div>

  <!-- Log daemon -->
  <div class="panel">
    <div class="panel-title">Log daemon (ultimele 200 linii)</div>
    <div class="log-box" id="logs"><div class="empty">Aștept log-uri...</div></div>
  </div>
</div>

<!-- Conversații per agent -->
<div class="panel" style="margin-bottom:20px">
  <div class="panel-title">Conversații agent</div>
  <div class="tabs" id="conv-tabs"><div class="empty">Aștept agenți...</div></div>
  <div class="conv-box" id="conv-box"><div class="empty">Selectează un agent.</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let agentNames = [];

  // ── Fetch helpers ───────────────────────────────────────────
  async function get(url) {
    const r = await fetch(API + url);
    return r.json();
  }
  async function post(url, body) {
    const r = await fetch(API + url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    return r.json();
  }

  // ── Toast notifications ─────────────────────────────────────
  let toastTimer;
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 2500);
  }

  // ── Render agents ───────────────────────────────────────────
  async function fetchAgents() {
    try {
      const { agents } = await get('/api/status');
      agentNames = (agents || []).map(a => a.name);
      updateAgentDropdown();
      buildTabs();

      const el = document.getElementById('agents');
      if (!agents?.length) { el.innerHTML = '<div class="empty">Niciun agent pornit.</div>'; return; }

      el.innerHTML = agents.map(a => {
        const dotCls = a.alive ? 'green' : 'red';
        const rowCls = a.alive ? 'alive' : 'dead';
        const toggleBtn = a.alive
          ? `<button class="btn btn-stop"    onclick="agentAction('stop','${a.name}')">Stop</button>`
          : `<button class="btn btn-start"   onclick="agentAction('start','${a.name}')">Start</button>`;
        const enableBtn = `<button class="btn btn-disable" onclick="agentAction('disable','${a.name}')" title="Dezactivează">Off</button>`;
        return `
        <div class="agent-row ${rowCls}">
          <div class="dot ${dotCls}"></div>
          <span class="agent-name">${esc(a.name)}</span>
          <span class="agent-meta">${esc(a.status)}</span>
          ${toggleBtn}
          ${enableBtn}
        </div>`;
      }).join('');
      document.getElementById('agent-ts').textContent = new Date().toLocaleTimeString();
    } catch {
      document.getElementById('agents').innerHTML = '<div class="empty">Daemon oprit.</div>';
    }
  }

  function updateAgentDropdown() {
    const sel = document.getElementById('bus-to');
    const current = sel.value;
    sel.innerHTML = '<option value="">— alege agent —</option>' +
      agentNames.map(n => `<option value="${n}" ${n===current?'selected':''}>${esc(n)}</option>`).join('');
  }

  // ── Agent actions (start/stop/enable/disable) ───────────────
  async function agentAction(action, name) {
    const r = await post('/api/agent', { action, name });
    const labels = { start: 'pornit', stop: 'oprit', enable: 'activat', disable: 'dezactivat' };
    toast(r.ok ? `${name} ${labels[action] || action}` : (r.error || 'Eroare'), !r.ok);
    setTimeout(fetchAgents, 500);
    setTimeout(fetchHeartbeats, 600);
  }

  // ── Send bus message ────────────────────────────────────────
  async function sendBus() {
    const to = document.getElementById('bus-to').value;
    const content = document.getElementById('bus-content').value.trim();
    if (!to) { toast('Alege un agent', true); return; }
    if (!content) { toast('Mesajul e gol', true); return; }

    const btn = document.getElementById('bus-send');
    btn.disabled = true;
    const r = await post('/api/bus', { to, content });
    btn.disabled = false;

    if (r.ok) {
      toast(`Mesaj trimis la ${to}`);
      document.getElementById('bus-content').value = '';
    } else {
      toast(r.error || 'Eroare la trimitere', true);
    }
  }

  // ── Heartbeats ──────────────────────────────────────────────
  async function fetchHeartbeats() {
    try {
      const { heartbeats } = await get('/api/heartbeats');
      const el = document.getElementById('hb-content');

      if (!heartbeats?.length) {
        el.innerHTML = '<div class="empty">Niciun heartbeat disponibil. Agenții scriu heartbeat la 60s.</div>';
        return;
      }

      const rows = heartbeats.map(h => {
        const uptime = h.uptimeSeconds != null ? fmtDuration(h.uptimeSeconds) : '—';
        const idle   = h.idleSeconds   != null ? fmtDuration(h.idleSeconds)   : '—';
        const idleCls = (h.idleSeconds > 300) ? 'warn' : 'ok';
        const last = esc((h.lastLine || '').slice(0, 60));
        const ts   = (h.timestamp || '').slice(11, 19);
        return `<tr>
          <td class="name">${esc(h.agent || '')}</td>
          <td class="${h.alive ? 'ok' : 'warn'}">${esc(h.status || '')}</td>
          <td>${uptime}</td>
          <td class="${idleCls}">${idle}</td>
          <td class="last">${last}</td>
          <td style="color:#333">${ts}</td>
          <td>
            <button class="btn btn-enable"  onclick="agentAction('enable','${esc(h.agent || '')}')" title="Activează">On</button>
            <button class="btn btn-disable" onclick="agentAction('disable','${esc(h.agent || '')}')" title="Dezactivează">Off</button>
          </td>
        </tr>`;
      }).join('');

      el.innerHTML = `<table class="hb-table">
        <thead><tr>
          <th>Agent</th><th>Status</th><th>Uptime</th><th>Idle</th><th>Ultima linie</th><th>Beat</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
      document.getElementById('hb-ts').textContent = new Date().toLocaleTimeString();
    } catch {
      document.getElementById('hb-content').innerHTML = '<div class="empty">Heartbeat indisponibil.</div>';
    }
  }

  function fmtDuration(sec) {
    if (sec < 60)   return `${sec}s`;
    if (sec < 3600) return `${Math.floor(sec / 60)}m`;
    return `${Math.floor(sec / 3600)}h ${Math.floor((sec % 3600) / 60)}m`;
  }

  // ── Bus messages ────────────────────────────────────────────
  async function fetchBus() {
    try {
      const { messages } = await get('/api/bus');
      const el = document.getElementById('bus-msgs');
      if (!messages?.length) { el.innerHTML = '<div class="empty">Niciun mesaj procesat.</div>'; return; }
      el.innerHTML = messages.map(m => `
        <div class="msg">
          <div class="msg-meta">${esc(m.from||'')} → ${esc(m.to||'')} · ${(m.timestamp||'').slice(0,19)}</div>
          <div class="msg-content">${esc(m.content||'')}</div>
        </div>`).join('');
    } catch {}
  }

  // ── Logs ────────────────────────────────────────────────────
  let logsAtBottom = true;
  async function fetchLogs() {
    try {
      const { lines } = await get('/api/logs');
      const box = document.getElementById('logs');
      logsAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 10;

      if (!lines?.length) { box.innerHTML = '<div class="empty">Niciun log.</div>'; return; }
      box.innerHTML = lines.map(line => {
        const cls = line.includes('[bus') ? 'bus'
          : line.includes('[daemon') ? 'daemon'
          : line.includes('ERR') ? 'err'
          : 'inf';
        return `<div class="log-line ${cls}">${esc(line)}</div>`;
      }).join('');

      if (logsAtBottom) box.scrollTop = box.scrollHeight;
    } catch {}
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Conversații per agent ───────────────────────────────────
  let activeAgent = '';

  function buildTabs() {
    const el = document.getElementById('conv-tabs');
    if (!agentNames.length) { el.innerHTML = '<div class="empty">Niciun agent activ.</div>'; return; }

    el.innerHTML = agentNames.map(n =>
      `<button class="tab ${n === activeAgent ? 'active' : ''}" onclick="selectAgent('${esc(n)}')">${esc(n)}</button>`
    ).join('');

    if (!activeAgent && agentNames.length) selectAgent(agentNames[0]);
  }

  async function selectAgent(name) {
    activeAgent = name;
    buildTabs();
    await fetchConversation();
  }

  async function fetchConversation() {
    if (!activeAgent) return;
    try {
      const { lines } = await get(`/api/output/${encodeURIComponent(activeAgent)}`);
      const box = document.getElementById('conv-box');
      const atBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 10;

      if (!lines?.length) { box.innerHTML = '<div class="empty">Niciun output încă.</div>'; return; }
      box.innerHTML = lines.map(l => `<div class="conv-line">${esc(l)}</div>`).join('');
      if (atBottom) box.scrollTop = box.scrollHeight;
    } catch {}
  }

  // ── Polling ─────────────────────────────────────────────────
  function refresh() {
    fetchAgents();
    fetchHeartbeats();
    fetchBus();
    fetchLogs();
    fetchConversation();
  }
  refresh();
  setInterval(refresh, 3000);

  document.getElementById('bus-content').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) sendBus();
  });
</script>
</body>
</html>
