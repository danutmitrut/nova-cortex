<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Cortex Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 24px; }
  h1 { color: #7ee8a2; font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.8rem; margin-bottom: 32px; }
  .section { margin-bottom: 32px; }
  .section-title { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 6px; }
  .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .agent-card { background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
  .agent-card.alive { border-color: #1a4a2a; }
  .agent-card.dead { border-color: #4a1a1a; }
  .agent-name { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .agent-status { font-size: 0.75rem; color: #888; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.green { background: #7ee8a2; box-shadow: 0 0 6px #7ee8a2; }
  .dot.red { background: #e87e7e; }
  .bus-list { display: flex; flex-direction: column; gap: 8px; }
  .bus-msg { background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; font-size: 0.8rem; }
  .bus-meta { color: #555; font-size: 0.72rem; margin-bottom: 4px; }
  .bus-content { color: #ccc; white-space: pre-wrap; word-break: break-word; }
  .empty { color: #444; font-size: 0.85rem; font-style: italic; }
  .refresh-info { position: fixed; bottom: 16px; right: 20px; color: #333; font-size: 0.72rem; }
  .countdown { color: #555; }
</style>
</head>
<body>
<h1>⬡ Nova Cortex</h1>
<p class="subtitle">Dashboard local — auto-refresh la 5s</p>

<div class="section">
  <div class="section-title">Agenți</div>
  <div class="agent-grid" id="agents">
    <div class="empty">Se încarcă...</div>
  </div>
</div>

<div class="section">
  <div class="section-title">Ultimele mesaje bus</div>
  <div class="bus-list" id="bus">
    <div class="empty">Niciun mesaj procesat încă.</div>
  </div>
</div>

<div class="refresh-info">refresh în <span class="countdown" id="countdown">5</span>s</div>

<script>
  let timer = 5;

  async function fetchStatus() {
    try {
      const res = await fetch('/api/status');
      const { agents } = await res.json();
      const el = document.getElementById('agents');

      if (!agents?.length) {
        el.innerHTML = '<div class="empty">Niciun agent pornit.</div>';
        return;
      }

      el.innerHTML = agents.map(a => `
        <div class="agent-card ${a.alive ? 'alive' : 'dead'}">
          <div class="agent-name">
            <span class="dot ${a.alive ? 'green' : 'red'}"></span>${a.name}
          </div>
          <div class="agent-status">${a.status}</div>
        </div>
      `).join('');
    } catch {
      document.getElementById('agents').innerHTML = '<div class="empty">Daemon oprit.</div>';
    }
  }

  async function fetchBus() {
    try {
      const res = await fetch('/api/bus');
      const { messages } = await res.json();
      const el = document.getElementById('bus');

      if (!messages?.length) {
        el.innerHTML = '<div class="empty">Niciun mesaj procesat încă.</div>';
        return;
      }

      el.innerHTML = messages.map(m => `
        <div class="bus-msg">
          <div class="bus-meta">${m.from} → ${m.to} &nbsp;|&nbsp; ${m.timestamp?.slice(0, 19) ?? ''}</div>
          <div class="bus-content">${escHtml(m.content ?? '')}</div>
        </div>
      `).join('');
    } catch {}
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function tick() {
    timer--;
    document.getElementById('countdown').textContent = timer;
    if (timer <= 0) {
      timer = 5;
      fetchStatus();
      fetchBus();
    }
  }

  fetchStatus();
  fetchBus();
  setInterval(tick, 1000);
</script>
</body>
</html>
