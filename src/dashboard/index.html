<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Cortex</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; padding: 20px 24px; }
  h1 { color: #7ee8a2; font-size: 1.3rem; font-weight: 600; }
  .subtitle { color: #444; font-size: 0.75rem; margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media(max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: #111; border: 1px solid #222; border-radius: 8px; padding: 16px; }
  .panel-title { color: #666; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
  /* Agents */
  .agent-list { display: flex; flex-direction: column; gap: 8px; }
  .agent-row { display: flex; align-items: center; gap: 10px; background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 12px; }
  .agent-row.alive { border-color: #1a4a2a; }
  .agent-row.dead { border-color: #4a1a1a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: #7ee8a2; box-shadow: 0 0 5px #7ee8a2; }
  .dot.red { background: #e87e7e; }
  .agent-name { flex: 1; font-size: 0.9rem; }
  .agent-status { color: #555; font-size: 0.72rem; margin-right: 8px; }
  .btn { border: none; border-radius: 4px; padding: 4px 10px; font-size: 0.72rem; cursor: pointer; font-family: inherit; }
  .btn-start { background: #1a4a2a; color: #7ee8a2; }
  .btn-start:hover { background: #1f5a32; }
  .btn-stop { background: #4a1a1a; color: #e87e7e; }
  .btn-stop:hover { background: #5a2020; }
  .btn-send { background: #1a2a4a; color: #7eb8e8; padding: 8px 16px; font-size: 0.8rem; width: 100%; margin-top: 10px; }
  .btn-send:hover { background: #1f3260; }
  .btn-send:disabled { opacity: 0.4; cursor: default; }
  /* Bus form */
  select, textarea { width: 100%; background: #161616; border: 1px solid #2a2a2a; border-radius: 4px; color: #e0e0e0; font-family: inherit; font-size: 0.8rem; padding: 8px 10px; outline: none; }
  select { margin-bottom: 8px; }
  select:focus, textarea:focus { border-color: #444; }
  textarea { resize: vertical; min-height: 70px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1a4a2a; color: #7ee8a2; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: #4a1a1a; color: #e87e7e; }
  /* Bus messages */
  .msg-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .msg { background: #161616; border: 1px solid #222; border-radius: 5px; padding: 8px 10px; font-size: 0.75rem; }
  .msg-meta { color: #555; margin-bottom: 3px; }
  .msg-content { color: #bbb; white-space: pre-wrap; word-break: break-word; max-height: 60px; overflow: hidden; }
  /* Logs */
  .log-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 5px; height: 300px; overflow-y: auto; padding: 10px; font-size: 0.72rem; line-height: 1.5; }
  .log-line { color: #555; }
  .log-line.inf { color: #888; }
  .log-line.err { color: #c07070; }
  .log-line.bus { color: #7090c0; }
  .log-line.daemon { color: #70a870; }
  .empty { color: #333; font-size: 0.8rem; font-style: italic; }
  .refresh-badge { float: right; color: #333; font-size: 0.65rem; }
</style>
</head>
<body>
<h1>⬡ Nova Cortex</h1>
<p class="subtitle">Dashboard local · auto-refresh 3s</p>

<div class="grid">
  <!-- Agenți -->
  <div class="panel">
    <div class="panel-title">Agenți <span class="refresh-badge" id="agent-ts"></span></div>
    <div class="agent-list" id="agents"><div class="empty">Se încarcă...</div></div>
  </div>

  <!-- Trimite mesaj bus -->
  <div class="panel">
    <div class="panel-title">Trimite mesaj bus</div>
    <select id="bus-to"><option value="">— alege agent —</option></select>
    <textarea id="bus-content" placeholder='ex: "Analizează tendințele AI din 2025"' rows="3"></textarea>
    <button class="btn btn-send" id="bus-send" onclick="sendBus()">Trimite</button>
  </div>
</div>

<div class="grid">
  <!-- Mesaje bus recente -->
  <div class="panel">
    <div class="panel-title">Mesaje bus recente</div>
    <div class="msg-list" id="bus-msgs"><div class="empty">Niciun mesaj procesat.</div></div>
  </div>

  <!-- Log daemon -->
  <div class="panel">
    <div class="panel-title">Log daemon (ultimele 200 linii)</div>
    <div class="log-box" id="logs"><div class="empty">Aștept log-uri...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let agentNames = [];

  // ── Fetch helpers ───────────────────────────────────────────
  async function get(url) {
    const r = await fetch(API + url);
    return r.json();
  }
  async function post(url, body) {
    const r = await fetch(API + url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    return r.json();
  }

  // ── Toast notifications ─────────────────────────────────────
  let toastTimer;
  function toast(msg, err = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (err ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = 'toast', 2500);
  }

  // ── Render agents ───────────────────────────────────────────
  async function fetchAgents() {
    try {
      const { agents } = await get('/api/status');
      agentNames = (agents || []).map(a => a.name);
      updateAgentDropdown();

      const el = document.getElementById('agents');
      if (!agents?.length) { el.innerHTML = '<div class="empty">Niciun agent pornit.</div>'; return; }

      el.innerHTML = agents.map(a => `
        <div class="agent-row ${a.alive ? 'alive' : 'dead'}">
          <div class="dot ${a.alive ? 'green' : 'red'}"></div>
          <span class="agent-name">${a.name}</span>
          <span class="agent-status">${a.status}</span>
          ${a.alive
            ? `<button class="btn btn-stop" onclick="agentAction('stop','${a.name}')">Stop</button>`
            : `<button class="btn btn-start" onclick="agentAction('start','${a.name}')">Start</button>`
          }
        </div>`).join('');
      document.getElementById('agent-ts').textContent = new Date().toLocaleTimeString();
    } catch {
      document.getElementById('agents').innerHTML = '<div class="empty">Daemon oprit.</div>';
    }
  }

  function updateAgentDropdown() {
    const sel = document.getElementById('bus-to');
    const current = sel.value;
    sel.innerHTML = '<option value="">— alege agent —</option>' +
      agentNames.map(n => `<option value="${n}" ${n===current?'selected':''}>${n}</option>`).join('');
  }

  // ── Agent start/stop ────────────────────────────────────────
  async function agentAction(action, name) {
    const r = await post('/api/agent', { action, name });
    toast(r.ok ? `${name} ${action === 'start' ? 'pornit' : 'oprit'}` : (r.error || 'Eroare'), !r.ok);
    setTimeout(fetchAgents, 500);
  }

  // ── Send bus message ────────────────────────────────────────
  async function sendBus() {
    const to = document.getElementById('bus-to').value;
    const content = document.getElementById('bus-content').value.trim();
    if (!to) { toast('Alege un agent', true); return; }
    if (!content) { toast('Mesajul e gol', true); return; }

    const btn = document.getElementById('bus-send');
    btn.disabled = true;
    const r = await post('/api/bus', { to, content });
    btn.disabled = false;

    if (r.ok) {
      toast(`Mesaj trimis la ${to}`);
      document.getElementById('bus-content').value = '';
    } else {
      toast(r.error || 'Eroare la trimitere', true);
    }
  }

  // ── Bus messages ────────────────────────────────────────────
  async function fetchBus() {
    try {
      const { messages } = await get('/api/bus');
      const el = document.getElementById('bus-msgs');
      if (!messages?.length) { el.innerHTML = '<div class="empty">Niciun mesaj procesat.</div>'; return; }
      el.innerHTML = messages.map(m => `
        <div class="msg">
          <div class="msg-meta">${m.from} → ${m.to} · ${(m.timestamp||'').slice(0,19)}</div>
          <div class="msg-content">${esc(m.content||'')}</div>
        </div>`).join('');
    } catch {}
  }

  // ── Logs ────────────────────────────────────────────────────
  let logsAtBottom = true;
  async function fetchLogs() {
    try {
      const { lines } = await get('/api/logs');
      const box = document.getElementById('logs');
      logsAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 10;

      if (!lines?.length) { box.innerHTML = '<div class="empty">Niciun log.</div>'; return; }
      box.innerHTML = lines.map(line => {
        const cls = line.includes('[bus') ? 'bus'
          : line.includes('[daemon') ? 'daemon'
          : line.includes('ERR') ? 'err'
          : 'inf';
        return `<div class="log-line ${cls}">${esc(line)}</div>`;
      }).join('');

      if (logsAtBottom) box.scrollTop = box.scrollHeight;
    } catch {}
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Polling ─────────────────────────────────────────────────
  function refresh() { fetchAgents(); fetchBus(); fetchLogs(); }
  refresh();
  setInterval(refresh, 3000);

  // Keyboard shortcut: Enter în textarea trimite mesajul (Ctrl+Enter)
  document.getElementById('bus-content').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) sendBus();
  });
</script>
</body>
</html>
